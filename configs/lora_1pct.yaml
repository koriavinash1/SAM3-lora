dataset:
  img_root: /vol/biomedic3/agk21/blurgs/TNC/dataset/fishnet/images
  coco_json: /vol/biomedic3/agk21/blurgs/TNC/code/fishnet_coco_with_masks.json
  split: train

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "encoder"
    - "decoder"
    - "attention"
  trainable_fraction: 0.01

train:
  seed: 42
  epochs: 2
  batch_size: 1
  learning_rate: 0.0001
  output_dir: outputs/lora_1pct
  log_every_steps: 10
  # New parameters for improved training
  val_split_ratio: 0.1  # Use 10% of training data for validation
  use_class_weights: true  # Use inverse class weights for imbalanced datasets
  loss_type: "combined"  # Options: "dice", "focal", "combined"
  enable_validation: true  # Run validation after training
  validation_frequency: 1  # Validate every N batches (set high to reduce frequency)
  save_visualizations: true  # Save segmentation visualizations
  visualization_frequency: 10  # Save viz every N validations

model:
  # Use current SAM3 checkpoints/model IDs from facebookresearch/sam3.
  sam3_checkpoint: /vol/biomedic3/agk21/blurgs/TNC/sam3_checkpoint.pt
  device: cuda
